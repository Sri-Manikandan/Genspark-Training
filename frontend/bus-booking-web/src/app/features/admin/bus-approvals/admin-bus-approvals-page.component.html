<section class="space-y-4">
  <h1 class="text-2xl font-semibold">Bus approvals</h1>

  <table mat-table [dataSource]="buses()" class="w-full mat-elevation-z2">
    <ng-container matColumnDef="registration">
      <th mat-header-cell *matHeaderCellDef>Registration</th>
      <td mat-cell *matCellDef="let b">{{ b.registrationNumber }}</td>
    </ng-container>
    <ng-container matColumnDef="operator">
      <th mat-header-cell *matHeaderCellDef>Operator</th>
      <td mat-cell *matCellDef="let b">{{ b.operatorUserId }}</td>
    </ng-container>
    <ng-container matColumnDef="type">
      <th mat-header-cell *matHeaderCellDef>Type</th>
      <td mat-cell *matCellDef="let b">{{ b.busType }}</td>
    </ng-container>
    <ng-container matColumnDef="seats">
      <th mat-header-cell *matHeaderCellDef>Seats</th>
      <td mat-cell *matCellDef="let b">{{ b.capacity }}</td>
    </ng-container>
    <ng-container matColumnDef="approval">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let b">
        <mat-chip [class]="b.approvalStatus === 'approved' ? 'bg-emerald-100' : b.approvalStatus === 'rejected' ? 'bg-rose-100' : 'bg-amber-100'">
          {{ b.approvalStatus }}
        </mat-chip>
      </td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let b">
        @if (b.approvalStatus === 'pending') {
          <button mat-icon-button color="primary" (click)="approve(b.id)" title="Approve">
            <mat-icon>check</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="reject(b.id)" title="Reject">
            <mat-icon>close</mat-icon>
          </button>
        }
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</section>
