<section class="space-y-4">
  <h1 class="text-2xl font-semibold">Operator applications</h1>

  <table mat-table [dataSource]="requests()" class="w-full mat-elevation-z2">
    <ng-container matColumnDef="company">
      <th mat-header-cell *matHeaderCellDef>Company</th>
      <td mat-cell *matCellDef="let r">{{ r.companyName }}</td>
    </ng-container>
    <ng-container matColumnDef="user">
      <th mat-header-cell *matHeaderCellDef>User</th>
      <td mat-cell *matCellDef="let r">{{ r.userEmail }}</td>
    </ng-container>
    <ng-container matColumnDef="requestedAt">
      <th mat-header-cell *matHeaderCellDef>Requested</th>
      <td mat-cell *matCellDef="let r">{{ r.requestedAt | date:'mediumDate' }}</td>
    </ng-container>
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let r">{{ r.status }}</td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let r">
        @if (r.status === 'pending') {
          <button mat-icon-button color="primary" (click)="approve(r.id)" title="Approve">
            <mat-icon>check</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="reject(r.id)" title="Reject">
            <mat-icon>close</mat-icon>
          </button>
        }
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</section>
