<section class="space-y-4">
  <header class="flex items-center justify-between">
    <h1 class="text-2xl font-semibold">Buses</h1>
    <button mat-flat-button color="primary" (click)="openAddForm()">
      <mat-icon>add</mat-icon> Add bus
    </button>
  </header>

  <table mat-table [dataSource]="buses()" class="w-full mat-elevation-z2">
    <ng-container matColumnDef="registration">
      <th mat-header-cell *matHeaderCellDef>Registration</th>
      <td mat-cell *matCellDef="let b">{{ b.registrationNumber }}</td>
    </ng-container>
    <ng-container matColumnDef="type">
      <th mat-header-cell *matHeaderCellDef>Type</th>
      <td mat-cell *matCellDef="let b">{{ b.busType }}</td>
    </ng-container>
    <ng-container matColumnDef="capacity">
      <th mat-header-cell *matHeaderCellDef>Capacity</th>
      <td mat-cell *matCellDef="let b">{{ b.capacity }}</td>
    </ng-container>
    <ng-container matColumnDef="approval">
      <th mat-header-cell *matHeaderCellDef>Approval</th>
      <td mat-cell *matCellDef="let b">
        <mat-chip [class]="b.approvalStatus === 'approved' ? 'bg-emerald-100' : b.approvalStatus === 'rejected' ? 'bg-rose-100' : 'bg-amber-100'">
          {{ b.approvalStatus }}
        </mat-chip>
      </td>
    </ng-container>
    <ng-container matColumnDef="operational">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let b">{{ b.operationalStatus }}</td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let b">
        <button mat-icon-button [matMenuTriggerFor]="menu">
          <mat-icon>more_vert</mat-icon>
        </button>
        <mat-menu #menu="matMenu">
          @if (b.operationalStatus !== 'active') {
            <button mat-menu-item (click)="updateStatus(b.id, 'active')">Set active</button>
          }
          @if (b.operationalStatus !== 'under_maintenance') {
            <button mat-menu-item (click)="updateStatus(b.id, 'under_maintenance')">Set maintenance</button>
          }
          @if (b.operationalStatus !== 'retired') {
            <button mat-menu-item (click)="retire(b.id)">Retire</button>
          }
        </mat-menu>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</section>
