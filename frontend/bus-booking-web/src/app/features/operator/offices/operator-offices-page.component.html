<section class="space-y-4">
  <header class="flex items-center justify-between">
    <h1 class="text-2xl font-semibold">Offices</h1>
    <button mat-flat-button color="primary" (click)="openAddDialog()">
      <mat-icon>add</mat-icon> Add office
    </button>
  </header>

  <table mat-table [dataSource]="offices()" class="w-full mat-elevation-z2">
    <ng-container matColumnDef="city">
      <th mat-header-cell *matHeaderCellDef>City</th>
      <td mat-cell *matCellDef="let o">{{ o.cityName }}</td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let o" class="text-right">
        <button mat-icon-button color="warn" (click)="delete(o.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</section>
