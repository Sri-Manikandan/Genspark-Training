<div class="admin-dash">
  <header class="admin-dash__header">
    <div class="eyebrow eyebrow-oxblood">
      <span>Administration</span><span>·</span><span>Console</span>
    </div>
    <h1 class="display admin-dash__title">Control <span class="display-italic">panel.</span></h1>
    <p class="admin-dash__sub mono">Platform management — proceed with care</p>
  </header>

  <div class="admin-dash__rule"></div>

  <div class="admin-dash__grid">
    @for (item of navItems; track item.route) {
      <a [routerLink]="item.route" class="admin-nav-tile">
        <div class="admin-nav-tile__inner">
          <div class="admin-nav-tile__ix mono">{{ item.ix }}</div>
          <div class="admin-nav-tile__title">{{ item.title }}</div>
          <div class="admin-nav-tile__desc mono">{{ item.desc }}</div>
        </div>
        <div class="admin-nav-tile__arrow" aria-hidden="true">→</div>
      </a>
    }
  </div>
</div>
