<h2 mat-dialog-title>Add bus</h2>
<mat-dialog-content class="space-y-3">
  @if (error()) {
    <p class="text-rose-600 text-sm">{{ error() }}</p>
  }
  <form [formGroup]="form" class="space-y-3">
    <mat-form-field class="w-full">
      <mat-label>Registration number</mat-label>
      <input matInput formControlName="registrationNumber" />
    </mat-form-field>
    <mat-form-field class="w-full">
      <mat-label>Bus name</mat-label>
      <input matInput formControlName="busName" />
    </mat-form-field>
    <mat-form-field class="w-full">
      <mat-label>Bus type</mat-label>
      <mat-select formControlName="busType">
        @for (t of busTypes; track t) {
          <mat-option [value]="t">{{ t }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
    <div class="grid grid-cols-2 gap-3">
      <mat-form-field>
        <mat-label>Rows</mat-label>
        <input matInput type="number" formControlName="rows" />
      </mat-form-field>
      <mat-form-field>
        <mat-label>Columns</mat-label>
        <input matInput type="number" formControlName="columns" />
      </mat-form-field>
    </div>
    <p class="text-sm text-slate-500">Total seats: {{ capacity }}</p>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-flat-button color="primary" [disabled]="form.invalid || saving()" (click)="save()">
    @if (saving()) { <mat-spinner diameter="16"></mat-spinner> }
    Add bus
  </button>
</mat-dialog-actions>
