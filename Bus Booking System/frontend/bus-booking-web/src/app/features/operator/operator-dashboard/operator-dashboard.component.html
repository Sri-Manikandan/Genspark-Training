<div class="op-dash">
  <header class="op-dash__header">
    <div class="eyebrow eyebrow-oxblood">
      <span>Operations</span><span>·</span><span>Dashboard</span>
    </div>
    <h1 class="display op-dash__title">Your <span class="display-italic">fleet.</span></h1>
  </header>

  <div class="op-dash__rule"></div>

  <div class="op-dash__grid">
    <div class="op-dash__stat ticket ticket-notch-l ticket-notch-r">
      <div class="op-dash__stat-inner">
        <div class="op-dash__stat-ix mono">01</div>
        <div class="op-dash__stat-label mono">Offices</div>
        <div class="op-dash__stat-num">{{ officeCount() ?? '…' }}</div>
        <div class="op-dash__stat-sub mono">registered locations</div>
      </div>
    </div>
    <div class="op-dash__stat ticket ticket-notch-l ticket-notch-r">
      <div class="op-dash__stat-inner">
        <div class="op-dash__stat-ix mono">02</div>
        <div class="op-dash__stat-label mono">Buses</div>
        <div class="op-dash__stat-num">{{ busCount() ?? '…' }}</div>
        <div class="op-dash__stat-sub mono">in your fleet</div>
      </div>
    </div>
  </div>
</div>
