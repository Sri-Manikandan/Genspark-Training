<span class="cdt" [class.cdt--warning]="isWarning()" [class.cdt--expired]="isExpired()" aria-live="polite" aria-atomic="true">
  @if (isExpired()) {
    <span class="cdt__label mono">Expired</span>
  } @else {
    <span class="cdt__display mono">{{ display() }}</span>
    <span class="cdt__unit mono">remaining</span>
  }
</span>
